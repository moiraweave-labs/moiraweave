{{- range $name, $workload := .Values.workloads }}
{{- $deployment := default dict $workload.deployment }}
{{- $targets := default (list "local" "kubernetes") $deployment.targets }}
{{- if and ($workload.enabled) (ne (default "managed" $deployment.mode) "external") (has "kubernetes" $targets) ($workload.image) }}
{{- $ctx := dict "root" $ "name" $name "workload" $workload }}
{{- $secretNames := list }}
{{- range $secret := $workload.secrets }}
{{- $secretNames = append $secretNames $secret }}
{{- end }}
{{- if $workload.agent }}
{{- range $secret := $workload.agent.requiredSecrets }}
{{- $secretNames = append $secretNames $secret }}
{{- end }}
{{- if $workload.agent.authTokenEnv }}
{{- $secretNames = append $secretNames $workload.agent.authTokenEnv }}
{{- end }}
{{- end }}
{{- $secretNames = uniq $secretNames }}
{{- $persistenceMountPath := "" }}
{{- if and $workload.persistence $workload.persistence.enabled $workload.persistence.mountPath }}
{{- $persistenceMountPath = $workload.persistence.mountPath }}
{{- end }}
{{- $agentWorkspaceMount := "" }}
{{- if and $workload.agent $workload.agent.workspaceMount }}
{{- $agentWorkspaceMount = $workload.agent.workspaceMount }}
{{- end }}
{{- $needsDataVolume := or $persistenceMountPath $agentWorkspaceMount }}
{{- $needsWorkspaceMount := and $agentWorkspaceMount (ne $agentWorkspaceMount $persistenceMountPath) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "moiraweave.workload.fullname" $ctx }}
  labels:
    {{- include "moiraweave.labels" $ | nindent 4 }}
    app.kubernetes.io/component: workload
    moiraweave.io/workload: {{ $name }}
    moiraweave.io/workload-type: {{ $workload.type | quote }}
spec:
  replicas: {{ default (default 1 $workload.replicas) $deployment.replicas }}
  selector:
    matchLabels:
      {{- include "moiraweave.workload.selectorLabels" $ctx | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "moiraweave.workload.selectorLabels" $ctx | nindent 8 }}
    spec:
      serviceAccountName: {{ include "moiraweave.serviceAccountName" $ }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: workload
          image: {{ $workload.image | quote }}
          imagePullPolicy: {{ default "IfNotPresent" $workload.imagePullPolicy }}
          {{- if $workload.command }}
          command:
            {{- toYaml $workload.command | nindent 12 }}
          {{- end }}
          {{- if $workload.args }}
          args:
            {{- toYaml $workload.args | nindent 12 }}
          {{- end }}
          {{- if $workload.ports }}
          ports:
            {{- range $port := $workload.ports }}
            - name: {{ default "http" $port.name }}
              containerPort: {{ default $port.port $port.targetPort }}
              protocol: {{ default "TCP" $port.protocol }}
            {{- end }}
          {{- end }}
          env:
            {{- range $key, $value := $workload.env }}
            {{- if not (has $key $secretNames) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- range $secret := $secretNames }}
            - name: {{ $secret }}
              valueFrom:
                secretKeyRef:
                  name: {{ default $.Values.apiGateway.existingSecret $workload.existingSecret }}
                  key: {{ $secret }}
            {{- end }}
            - name: MOIRAWEAVE_WORKLOAD_NAME
              value: {{ $name | quote }}
            - name: REDIS_URL
              value: {{ include "moiraweave.redisUrl" $ | quote }}
            - name: QDRANT_URL
              value: {{ include "moiraweave.qdrantUrl" $ | quote }}
          {{- if $needsDataVolume }}
          volumeMounts:
            {{- if $persistenceMountPath }}
            - name: data
              mountPath: {{ $persistenceMountPath | quote }}
            {{- end }}
            {{- if $needsWorkspaceMount }}
            - name: data
              mountPath: {{ $agentWorkspaceMount | quote }}
              subPath: workspace
            {{- end }}
          {{- end }}
          {{- if $workload.livenessProbe }}
          livenessProbe:
            {{- toYaml $workload.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $workload.readinessProbe }}
          readinessProbe:
            {{- toYaml $workload.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- if $workload.resources }}
            {{- toYaml $workload.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
            {{- end }}
      {{- if $needsDataVolume }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "moiraweave.workload.fullname" $ctx }}-data
      {{- end }}
      {{- if $workload.nodeSelector }}
      nodeSelector:
        {{- toYaml $workload.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $workload.tolerations }}
      tolerations:
        {{- toYaml $workload.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
