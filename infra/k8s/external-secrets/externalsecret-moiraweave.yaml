# ---------------------------------------------------------------------------
# ExternalSecret — syncs the `moiraweave-secrets` K8s Secret from a cloud
# secrets manager.
#
# This ExternalSecret is provider-agnostic: point `secretStoreRef.name` to
# either `aws-secrets-manager` or `gcp-secret-manager` (defined in the
# secretstore-*.yaml files in this directory).
#
# Cloud secret layout expected:
#
#   AWS (one secret per key, or a single JSON secret):
#     moiraweave/jwt-secret-key        → JWT_SECRET_KEY
#     moiraweave/postgres-dsn          → POSTGRES_DSN
#     moiraweave/postgres-password     → POSTGRES_PASSWORD
#     moiraweave/postgres-admin-password → POSTGRES_POSTGRES_PASSWORD
#     moiraweave/redis-password        → REDIS_PASSWORD
#     moiraweave/hf-token              → HF_TOKEN (optional)
#
#   GCP (individual secrets):
#     moiraweave-jwt-secret-key        → JWT_SECRET_KEY
#     moiraweave-postgres-dsn          → POSTGRES_DSN
#     moiraweave-postgres-password     → POSTGRES_PASSWORD
#     moiraweave-postgres-admin-password → POSTGRES_POSTGRES_PASSWORD
#     moiraweave-redis-password        → REDIS_PASSWORD
#     moiraweave-hf-token              → HF_TOKEN (optional)
#
# The resulting K8s Secret (moiraweave-secrets) is referenced by:
#   - api-gateway Deployment  (JWT_SECRET_KEY via existingSecret)
#   - api-gateway/worker      (POSTGRES_DSN via postgresDsn Secret ref)
#   - postgres Bitnami chart  (POSTGRES_PASSWORD + POSTGRES_POSTGRES_PASSWORD)
#   - redis Bitnami chart     (REDIS_PASSWORD via auth.existingSecret)
#   - KEDA TriggerAuthentication (REDIS_PASSWORD)
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: moiraweave-secrets
  namespace: moiraweave          # change to your namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    # Switch between "aws-secrets-manager" and "gcp-secret-manager"
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: moiraweave-secrets
    creationPolicy: Owner
    # Keep the K8s secret if the ExternalSecret is deleted.
    deletionPolicy: Retain
  data:
    # JWT signing key used by the api-gateway
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/jwt-secret-key
    # Postgres connection string used by api-gateway and worker
    - secretKey: POSTGRES_DSN
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/postgres-dsn
    # Postgres application user password used by the Bitnami subchart
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/postgres-password
    # Postgres admin password used by the Bitnami subchart
    - secretKey: POSTGRES_POSTGRES_PASSWORD
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/postgres-admin-password
    # Redis password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/redis-password
    # HuggingFace token (optional — remove if not using gated models)
    - secretKey: HF_TOKEN
      remoteRef:
        # AWS path. Change to the secret name for GCP.
        key: moiraweave/hf-token
